# java-style-check.yml (в репозитории common)
name: Java Style Check

on:
  workflow_call:   # ← обязательно workflow_call для reusable workflow

jobs:
  checkstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Grant execute permissions for gradlew
        run: chmod +x gradlew

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download shared Checkstyle config
        run: |
          mkdir -p config/checkstyle
          curl -L https://raw.githubusercontent.com/New-Fitness/common/main/checkstyle/google_checks.xml \
            -o config/checkstyle/google_checks.xml

      - name: Run Checkstyle (no DB)
        run: |
          # Checkstyle работает с исходниками, не нужна компиляция
          ./gradlew checkstyleMain checkstyleTest \
            -x compileJava \
            -x compileTestJava \
            -x processResources \
            -x classes \
            --continue \
            --no-daemon || exit 1
