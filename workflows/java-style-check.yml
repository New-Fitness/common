name: Java Style Check

on:
  workflow_call:

jobs:
  checkstyle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Download Google Checkstyle config
        run: |
          mkdir -p config/checkstyle
          curl -sSL https://raw.githubusercontent.com/checkstyle/checkstyle/master/src/main/resources/google_checks.xml -o config/checkstyle/google_checks.xml

      - name: Run Checkstyle (Google Java Style)
        run: ./gradlew checkstyleMain checkstyleTest -PcheckstyleConfig=config/checkstyle/google_checks.xml
